<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Chuto Apu 🎂</title>

  <!-- Google Fonts: Poppins (body) + Dancing Script (headings) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== CONFETTI CANVAS ===================== -->
  <canvas id="confetti-canvas"></canvas>

  <!-- ===================== WELCOME / HERO ===================== -->
  <section id="welcome" class="section welcome-section">

    <!-- ===== BALLOON-POP INTRO ANIMATION ===== -->
    <div id="balloon-scene" class="balloon-scene">

      <!-- Cute cartoon cat with bow — SVG -->
      <div class="baby" id="baby">
        <svg viewBox="0 0 200 240" width="160" height="192" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="furGrad" cx="50%" cy="40%" r="55%">
              <stop offset="0%" stop-color="#f5e6d3"/>
              <stop offset="100%" stop-color="#e8cdb5"/>
            </radialGradient>
            <radialGradient id="bellyGrad" cx="50%" cy="45%" r="50%">
              <stop offset="0%" stop-color="#fff8f0"/>
              <stop offset="100%" stop-color="#f5e6d3"/>
            </radialGradient>
            <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="rgba(255,140,140,.45)"/>
              <stop offset="100%" stop-color="rgba(255,140,140,0)"/>
            </radialGradient>
            <linearGradient id="stripeGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#d4a574"/>
              <stop offset="100%" stop-color="#c8956a"/>
            </linearGradient>
            <linearGradient id="bowWoodGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#c8833b"/>
              <stop offset="50%" stop-color="#8B5E3C"/>
              <stop offset="100%" stop-color="#6e4328"/>
            </linearGradient>
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,.12)"/>
            </filter>
          </defs>

          <!-- === TAIL (behind body) === -->
          <g filter="url(#softShadow)">
            <path d="M52 185 Q20 170 15 140 Q12 125 22 120 Q30 128 30 145 Q32 165 55 178"
                  stroke="#e8cdb5" stroke-width="14" fill="none" stroke-linecap="round"/>
            <!-- Tail stripes -->
            <path d="M28 134 Q34 132 36 140" stroke="#d4a574" stroke-width="2.5" fill="none" opacity=".5"/>
            <path d="M22 126 Q28 124 30 130" stroke="#d4a574" stroke-width="2" fill="none" opacity=".4"/>
            <!-- Tail tip (darker) -->
            <circle cx="20" cy="122" r="8" fill="#c8956a" opacity=".6"/>
          </g>

          <!-- === BODY === -->
          <g filter="url(#softShadow)">
            <!-- Main body -->
            <ellipse cx="100" cy="175" rx="42" ry="48" fill="url(#furGrad)"/>
            <!-- Belly patch (lighter) -->
            <ellipse cx="100" cy="182" rx="28" ry="34" fill="url(#bellyGrad)"/>
            <!-- Body stripes -->
            <path d="M65 158 Q72 154 78 160" stroke="url(#stripeGrad)" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
            <path d="M60 170 Q68 165 75 172" stroke="url(#stripeGrad)" stroke-width="2.5" fill="none" opacity=".35" stroke-linecap="round"/>
            <path d="M122 158 Q128 154 135 160" stroke="url(#stripeGrad)" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
            <path d="M125 170 Q132 165 140 172" stroke="url(#stripeGrad)" stroke-width="2.5" fill="none" opacity=".35" stroke-linecap="round"/>

            <!-- Cute ribbon/collar -->
            <path d="M72 148 Q100 155 128 148" stroke="#ff6b9d" stroke-width="4" fill="none" stroke-linecap="round"/>
            <!-- Collar bell -->
            <circle cx="100" cy="154" r="5" fill="#ffd700" stroke="#e6c200" stroke-width="1"/>
            <line x1="100" y1="152" x2="100" y2="156" stroke="#c8a000" stroke-width="1"/>
            <!-- Collar bow -->
            <path d="M90 150 Q95 142 100 150 Q105 142 110 150" fill="#ff9ec4" stroke="#e07070" stroke-width="0.8"/>
          </g>

          <!-- === BACK LEGS (peeking out) === -->
          <g filter="url(#softShadow)">
            <!-- Left back paw -->
            <ellipse cx="72" cy="222" rx="16" ry="10" fill="url(#furGrad)"/>
            <ellipse cx="72" cy="224" rx="12" ry="6" fill="#fff8f0" opacity=".7"/>
            <!-- Paw pads -->
            <circle cx="66" cy="225" r="2.5" fill="#f0b0b0" opacity=".6"/>
            <circle cx="72" cy="226" r="2.5" fill="#f0b0b0" opacity=".6"/>
            <circle cx="78" cy="225" r="2.5" fill="#f0b0b0" opacity=".6"/>
            <!-- Right back paw -->
            <ellipse cx="128" cy="222" rx="16" ry="10" fill="url(#furGrad)"/>
            <ellipse cx="128" cy="224" rx="12" ry="6" fill="#fff8f0" opacity=".7"/>
            <circle cx="122" cy="225" r="2.5" fill="#f0b0b0" opacity=".6"/>
            <circle cx="128" cy="226" r="2.5" fill="#f0b0b0" opacity=".6"/>
            <circle cx="134" cy="225" r="2.5" fill="#f0b0b0" opacity=".6"/>
          </g>

          <!-- === LEFT FRONT PAW (resting) === -->
          <g filter="url(#softShadow)">
            <path d="M68 160 Q52 172 48 190 Q46 198 52 197" stroke="url(#furGrad)" stroke-width="16"
                  fill="none" stroke-linecap="round"/>
            <!-- Paw -->
            <ellipse cx="52" cy="198" rx="10" ry="7" fill="#f5e6d3"/>
            <!-- Paw pads -->
            <circle cx="46" cy="199" r="2" fill="#f0b0b0" opacity=".6"/>
            <circle cx="52" cy="201" r="2" fill="#f0b0b0" opacity=".6"/>
            <circle cx="58" cy="199" r="2" fill="#f0b0b0" opacity=".6"/>
            <ellipse cx="52" cy="195" rx="4" ry="2.5" fill="#f0b0b0" opacity=".4"/>
          </g>

          <!-- === RIGHT FRONT PAW (holding bow) === -->
          <g filter="url(#softShadow)" class="baby-arm-group">
            <path d="M132 160 Q152 148 164 132" stroke="url(#furGrad)" stroke-width="16"
                  fill="none" stroke-linecap="round"/>
            <!-- Paw gripping bow -->
            <ellipse cx="165" cy="131" rx="9" ry="7" fill="#f5e6d3"/>
            <circle cx="160" cy="132" r="2" fill="#f0b0b0" opacity=".5"/>
            <circle cx="165" cy="134" r="2" fill="#f0b0b0" opacity=".5"/>
            <circle cx="170" cy="132" r="2" fill="#f0b0b0" opacity=".5"/>

            <!-- === BOW (weapon) === -->
            <g transform="translate(170,90)">
              <!-- Bow limbs -->
              <path d="M0 0 Q20 22 0 44" stroke="url(#bowWoodGrad)" stroke-width="5"
                    fill="none" stroke-linecap="round"/>
              <path d="M-1 3 Q6 10 2 16" stroke="#6e4328" stroke-width="1" fill="none" opacity=".3"/>
              <path d="M-1 28 Q6 34 2 41" stroke="#6e4328" stroke-width="1" fill="none" opacity=".3"/>
              <!-- Bowstring -->
              <line x1="0" y1="1" x2="0" y2="43" stroke="#ddd" stroke-width="1.5"/>
              <path d="M0 1 Q-10 22 0 43" stroke="rgba(200,200,200,.5)" stroke-width="1"
                    fill="none" stroke-dasharray="2,3"/>
              <!-- Grip wrap -->
              <rect x="-3" y="18" width="6" height="8" rx="2" fill="#a0522d" opacity=".6"/>
            </g>
          </g>

          <!-- === HEAD === -->
          <g filter="url(#softShadow)">
            <!-- Head shape (rounder for cat) -->
            <ellipse cx="100" cy="82" rx="50" ry="46" fill="url(#furGrad)"/>

            <!-- === EARS (pointed triangular cat ears) === -->
            <!-- Left ear (outer) -->
            <path d="M58 60 L42 14 L78 48 Z" fill="#e8cdb5"/>
            <!-- Left ear (inner pink) -->
            <path d="M60 55 L48 22 L74 48 Z" fill="#ffb8c6" opacity=".7"/>
            <!-- Left ear fur tuft -->
            <path d="M55 42 Q58 36 62 42" stroke="#f5e6d3" stroke-width="2" fill="none"/>
            <!-- Right ear (outer) -->
            <path d="M142 60 L158 14 L122 48 Z" fill="#e8cdb5"/>
            <!-- Right ear (inner pink) -->
            <path d="M140 55 L152 22 L126 48 Z" fill="#ffb8c6" opacity=".7"/>
            <!-- Right ear fur tuft -->
            <path d="M138 42 Q142 36 145 42" stroke="#f5e6d3" stroke-width="2" fill="none"/>

            <!-- Forehead stripes (tabby markings) -->
            <path d="M88 52 Q100 44 112 52" stroke="#d4a574" stroke-width="2.5" fill="none" opacity=".4" stroke-linecap="round"/>
            <path d="M82 58 Q86 54 90 58" stroke="#d4a574" stroke-width="2" fill="none" opacity=".3" stroke-linecap="round"/>
            <path d="M110 58 Q114 54 118 58" stroke="#d4a574" stroke-width="2" fill="none" opacity=".3" stroke-linecap="round"/>
            <!-- Classic "M" marking -->
            <path d="M85 55 L92 48 L100 54 L108 48 L115 55" stroke="#c8956a" stroke-width="1.5" fill="none" opacity=".35" stroke-linecap="round"/>

            <!-- === EYES (big cat eyes) === -->
            <!-- Left eye -->
            <g class="baby-eye-group">
              <ellipse cx="78" cy="82" rx="14" ry="13" fill="white"/>
              <!-- Iris (green cat eyes) -->
              <ellipse cx="80" cy="83" rx="9" ry="10" fill="#7ab648"/>
              <!-- Iris detail ring -->
              <ellipse cx="80" cy="83" rx="7" ry="8" fill="#5a9e30"/>
              <!-- Cat pupil (vertical slit) -->
              <ellipse cx="80" cy="83" rx="3" ry="9" fill="#1a1a1a"/>
              <!-- Eye highlights -->
              <circle cx="84" cy="78" r="3.5" fill="white" opacity=".9"/>
              <circle cx="76" cy="86" r="1.5" fill="white" opacity=".5"/>
              <!-- Upper eyelid line -->
              <path d="M64 75 Q78 68 92 75" stroke="#8B7355" stroke-width="2" fill="none"/>
              <!-- Lower eyelid hint -->
              <path d="M67 90 Q78 94 90 90" stroke="#c8b090" stroke-width="1" fill="none" opacity=".4"/>
            </g>
            <!-- Right eye -->
            <g class="baby-eye-group">
              <ellipse cx="122" cy="82" rx="14" ry="13" fill="white"/>
              <ellipse cx="124" cy="83" rx="9" ry="10" fill="#7ab648"/>
              <ellipse cx="124" cy="83" rx="7" ry="8" fill="#5a9e30"/>
              <ellipse cx="124" cy="83" rx="3" ry="9" fill="#1a1a1a"/>
              <circle cx="128" cy="78" r="3.5" fill="white" opacity=".9"/>
              <circle cx="120" cy="86" r="1.5" fill="white" opacity=".5"/>
              <path d="M108 75 Q122 68 136 75" stroke="#8B7355" stroke-width="2" fill="none"/>
              <path d="M110 90 Q122 94 134 90" stroke="#c8b090" stroke-width="1" fill="none" opacity=".4"/>
            </g>

            <!-- === NOSE (pink cat triangle) === -->
            <path d="M95 96 L100 102 L105 96 Z" fill="#ff8fa0"/>
            <ellipse cx="100" cy="97" rx="5.5" ry="3.8" fill="#ff8fa0"/>
            <!-- Nose highlight -->
            <ellipse cx="98" cy="96" rx="2" ry="1.2" fill="rgba(255,255,255,.4)"/>

            <!-- === MOUTH === -->
            <!-- Nose-to-mouth line -->
            <line x1="100" y1="101" x2="100" y2="106" stroke="#c8856a" stroke-width="1.2"/>
            <!-- Smile curves -->
            <path d="M100 106 Q90 114 82 110" stroke="#c8856a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <path d="M100 106 Q110 114 118 110" stroke="#c8856a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

            <!-- === WHISKERS === -->
            <!-- Left whiskers -->
            <line x1="70" y1="92" x2="30" y2="86" stroke="#c8b090" stroke-width="1.2" opacity=".6"/>
            <line x1="68" y1="98" x2="26" y2="98" stroke="#c8b090" stroke-width="1.2" opacity=".5"/>
            <line x1="70" y1="104" x2="30" y2="110" stroke="#c8b090" stroke-width="1.2" opacity=".6"/>
            <!-- Right whiskers -->
            <line x1="130" y1="92" x2="170" y2="86" stroke="#c8b090" stroke-width="1.2" opacity=".6"/>
            <line x1="132" y1="98" x2="174" y2="98" stroke="#c8b090" stroke-width="1.2" opacity=".5"/>
            <line x1="130" y1="104" x2="170" y2="110" stroke="#c8b090" stroke-width="1.2" opacity=".6"/>
            <!-- Whisker dots -->
            <circle cx="72" cy="98" r="1" fill="#c8b090" opacity=".5"/>
            <circle cx="128" cy="98" r="1" fill="#c8b090" opacity=".5"/>

            <!-- === CHEEKS (blush) === -->
            <ellipse cx="62" cy="100" rx="10" ry="7" fill="url(#cheekGrad)"/>
            <ellipse cx="138" cy="100" rx="10" ry="7" fill="url(#cheekGrad)"/>

            <!-- Fur tufts on cheeks -->
            <path d="M55 90 Q50 86 52 80" stroke="#e8cdb5" stroke-width="3" fill="none" stroke-linecap="round" opacity=".6"/>
            <path d="M145 90 Q150 86 148 80" stroke="#e8cdb5" stroke-width="3" fill="none" stroke-linecap="round" opacity=".6"/>
          </g>
        </svg>
      </div>

      <!-- Realistic arrow — SVG -->
      <div class="arrow" id="arrow">
        <svg viewBox="0 0 140 24" width="120" height="20" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="shaftGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#c8833b"/>
              <stop offset="50%" stop-color="#a0724a"/>
              <stop offset="100%" stop-color="#8B5E3C"/>
            </linearGradient>
            <linearGradient id="tipGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#888"/>
              <stop offset="100%" stop-color="#bbb"/>
            </linearGradient>
          </defs>
          <!-- Shaft -->
          <rect x="20" y="10" width="100" height="4" rx="2" fill="url(#shaftGrad)"/>
          <!-- Wood grain lines on shaft -->
          <line x1="35" y1="11" x2="55" y2="11" stroke="#6e4328" stroke-width=".5" opacity=".3"/>
          <line x1="60" y1="13" x2="90" y2="13" stroke="#6e4328" stroke-width=".5" opacity=".25"/>
          <line x1="95" y1="11.5" x2="115" y2="11.5" stroke="#6e4328" stroke-width=".5" opacity=".2"/>
          <!-- Arrowhead (metallic triangle) -->
          <polygon points="120,12 140,5 137,12 140,19" fill="url(#tipGrad)"
                   stroke="#777" stroke-width=".8"/>
          <line x1="125" y1="10" x2="133" y2="7" stroke="#aaa" stroke-width=".4" opacity=".6"/>
          <line x1="125" y1="14" x2="133" y2="17" stroke="#aaa" stroke-width=".4" opacity=".6"/>
          <!-- Nock (back notch) -->
          <rect x="16" y="9" width="6" height="6" rx="1" fill="#6e4328"/>
          <line x1="19" y1="9" x2="19" y2="15" stroke="#8B5E3C" stroke-width="1"/>
          <!-- Feather fletching (3 feathers) -->
          <!-- Feather 1 (top) -->
          <path d="M18 10 Q10 2 4 5 Q8 8 18 10Z" fill="#e07070" opacity=".85"/>
          <path d="M10 5 Q14 7 17 10" stroke="#c55" stroke-width=".5" fill="none" opacity=".4"/>
          <!-- Feather 2 (bottom) -->
          <path d="M18 14 Q10 22 4 19 Q8 16 18 14Z" fill="#ff9ec4" opacity=".85"/>
          <path d="M10 19 Q14 17 17 14" stroke="#e07070" stroke-width=".5" fill="none" opacity=".4"/>
          <!-- Feather 3 (middle, subtle) -->
          <path d="M20 11 Q12 8 8 12 Q14 12 20 13Z" fill="#f4a6c1" opacity=".5"/>
          <!-- Heart on shaft (Cupid arrow) -->
          <g transform="translate(70,6) scale(.5)">
            <path d="M0 6 Q0 0 6 0 Q12 0 12 6 Q12 10 6 16 Q0 10 0 6Z" fill="#e74c8b" opacity=".7"/>
          </g>
        </svg>
      </div>

      <!-- Balloon -->
      <div class="balloon-group" id="balloon-group">
        <div class="balloon" id="balloon">
          <div class="balloon-shine"></div>
          <span class="balloon-text">🎂</span>
        </div>
        <div class="balloon-string"></div>
      </div>

      <!-- Pop particles (hidden until pop) -->
      <div class="pop-particles" id="pop-particles"></div>

      <!-- Prompt -->
      <p class="scene-prompt" id="scene-prompt">Tap the cat to shoot! 🏹🐱</p>
    </div>

    <!-- ===== WISH CONTENT (hidden until balloon pops) ===== -->
    <div class="welcome-content" id="wish-content" style="display:none;">

      <h1 class="hero-title">
        <span class="line line-1">Happy Birthday</span>
        <span class="line line-2">Chuto Apu 💖</span>
      </h1>
      <p class="hero-sub">Wishing you all the love and happiness in the world!</p>

      <div class="hero-buttons">
        <a href="memories.html" class="btn-cute" aria-label="Open Memories">
          🎁 Open Memories
        </a>
        <a href="note.html" class="btn-cute btn-secondary" aria-label="Read My Note">
          💌 Read My Note
        </a>
      </div>

    </div>

    <!-- Floating decorations rendered by JS -->
    <div class="floating-elements" aria-hidden="true"></div>
  </section>

  <!-- Floating hearts container (JS adds hearts here) -->
  <div id="click-hearts" aria-hidden="true"></div>

  <!-- Warm background glow -->
  <div class="warm-glow" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
